name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: ${{ matrix.os }} / TLS=${{ matrix.tls }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        tls: [ON, OFF]

    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # OpenSSL — install only when TLS is ON
      # -----------------------------------------------------------------------
      - name: Install OpenSSL (Ubuntu)
        if: runner.os == 'Linux' && matrix.tls == 'ON'
        run: sudo apt-get update -qq && sudo apt-get install -y libssl-dev

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS' && matrix.tls == 'ON'
        run: |
          brew install openssl
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl)" >> "$GITHUB_ENV"

      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows' && matrix.tls == 'ON'
        shell: pwsh
        run: |
          choco install openssl --no-progress -y
          # Resolve actual install path (choco may land in either location)
          $root = @(
            'C:/Program Files/OpenSSL-Win64',
            'C:/Program Files/OpenSSL'
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          echo "OPENSSL_ROOT_DIR=$root" >> $env:GITHUB_ENV

      # -----------------------------------------------------------------------
      # Configure — passes -DOPENSSL_ROOT_DIR only when the env var is set
      # -----------------------------------------------------------------------
      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          EXTRA=""
          if [ -n "$OPENSSL_ROOT_DIR" ]; then
            EXTRA="-DOPENSSL_ROOT_DIR=$OPENSSL_ROOT_DIR"
          fi
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPICO_ENABLE_TLS=${{ matrix.tls }} \
            $EXTRA

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $extra = @()
          if ($env:OPENSSL_ROOT_DIR) {
            $extra += "-DOPENSSL_ROOT_DIR=$env:OPENSSL_ROOT_DIR"
          }
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DPICO_ENABLE_TLS=${{ matrix.tls }} `
            @extra

      # -----------------------------------------------------------------------
      # Build & test
      # --config Release is required for VS multi-config generators (Windows);
      # it is a no-op for single-config generators (Make/Ninja on Linux/macOS).
      # -----------------------------------------------------------------------
      - name: Build
        run: cmake --build build --parallel --config Release

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --parallel 4 -C Release
