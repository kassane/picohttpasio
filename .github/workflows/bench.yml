name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  techempower:
    name: TechEmpower-style benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@main

      # -----------------------------------------------------------------------
      # FetchContent dependency cache
      # -----------------------------------------------------------------------
      - name: Cache FetchContent dependencies
        uses: actions/cache@main
        with:
          path: build/_deps
          key: deps-bench-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-bench-

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libssl-dev wrk

      # -----------------------------------------------------------------------
      # Build only the benchmark target (tests and examples disabled)
      # -----------------------------------------------------------------------
      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPICO_ENABLE_TLS=ON \
            -DPICO_BUILD_TESTS=OFF \
            -DPICO_BUILD_EXAMPLES=OFF \
            -DPICO_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build --parallel --target techempower_bench

      - name: Start server
        run: |
          ./build/examples/techempower_bench &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          # Wait until the port is accepting connections (max 5 s)
          for i in $(seq 1 10); do
            curl -sf http://localhost:8080/plaintext > /dev/null && break
            sleep 0.5
          done

      # -----------------------------------------------------------------------
      # Warmup + benchmark — results are informational, not a pass/fail gate
      # -----------------------------------------------------------------------
      - name: Warmup
        run: wrk -t2 -c32 -d3s http://localhost:8080/plaintext > /dev/null

      - name: Benchmark — Plaintext (category 6)
        run: |
          echo "### Plaintext — /plaintext"
          wrk -t4 -c128 -d10s --latency http://localhost:8080/plaintext

      - name: Benchmark — JSON serialization (category 1)
        run: |
          echo "### JSON — /json"
          wrk -t4 -c128 -d10s --latency http://localhost:8080/json

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true
